<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Сметы</title>
    <meta name="description" content="Интерфейс смет для GitHub Pages" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="mode-mobile">
    <div class="layout">
      <aside class="sidebar" id="sidebar" aria-label="Список смет">
        <div class="sidebar-panel">
          <div class="sidebar-header">
            <h1>Сметы</h1>
            <div class="header-actions">
              <button class="btn btn-icon" type="button" data-action="close-sidebar" title="Закрыть">✕</button>
            </div>
          </div>
          <div class="estimates-list" data-slot="estimate-list" role="list"></div>
          <div class="sidebar-footer">
            <button class="btn btn-primary btn-block" type="button" data-action="new-estimate">+ Новая смета</button>
            <div class="sidebar-note">
              Сохранение в браузере (localStorage).<br />
              Версия: <span data-slot="site-version">—</span>
            </div>
          </div>
        </div>
      </aside>

      <main class="content" aria-label="Редактор сметы">
        <div class="topbar">
          <button class="btn btn-icon menu-btn" type="button" data-action="toggle-sidebar" title="Список смет">
            ☰
          </button>
          <div class="topbar-title" data-slot="topbar-title">Смета</div>
          <div class="topbar-actions">
            <button class="btn btn-icon" type="button" data-action="refresh" title="Обновить">↻</button>
          </div>
        </div>

        <div class="content-empty" data-slot="empty-state">
          <div class="icon" aria-hidden="true">📋</div>
          <div>Выберите смету слева или создайте новую</div>
          <button class="btn btn-primary" type="button" data-action="new-estimate">+ Создать смету</button>
        </div>

        <section class="doc" data-slot="doc" style="display: none">
          <div class="docActions" data-slot="doc-actions">
            <button class="btn btn-primary" type="button" data-action="edit-enter">Редактировать</button>
            <button class="btn btn-primary" type="button" data-action="edit-save" style="display:none">Сохранить</button>
            <button class="btn" type="button" data-action="edit-cancel" style="display:none">Отменить</button>
          </div>

          <h1 class="docTitle" data-slot="doc-title"></h1>

          <table class="smeta" data-slot="items-table" aria-label="Таблица сметы"></table>

          <div class="actions-bar" data-slot="edit-only-actions" style="display:none">
            <button class="btn btn-add btn-block" type="button" data-action="add-row">+ Добавить строку</button>
          </div>

          <div class="total-bar" data-slot="editor-footer"></div>

          <div class="sign" data-slot="sign"></div>
        </section>
      </main>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
